version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: force_learning_postgres
    environment:
      POSTGRES_DB: force_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: force_learning_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: force_learning_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: force_learning
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: "8080"
      JWT_SECRET: your-secret-key-change-in-production
      UPLOAD_PATH: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads:
